<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超能下蛋鸭 - 专属兑换码中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "幼圆", sans-serif;
        }
        body {
            background-color: #fff9e8;
            background-image: radial-gradient(#ffe8b9 10%, transparent 11%);
            background-size: 20px 20px;
            padding: 18px;
        }
        .duck-wrap {
            max-width: 620px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 6px 18px rgba(255, 180, 60, 0.25);
            border: 2px solid #ffd88a;
        }
        .duck-title {
            text-align: center;
            margin-bottom: 12px;
        }
        .duck-title h1 {
            color: #ffaa2b;
            font-size: 26px;
            letter-spacing: 2px;
        }
        .duck-desc {
            text-align: center;
            color: #b98c48;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .code-card {
            background: #fff5dc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ffe2a0;
        }
        .code-info .code-str {
            font-size: 17px;
            font-weight: bold;
            color: #6b4f28;
        }
        .new-badge {
            display: inline-block;
            background: #ff5959;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .code-tip {
            font-size: 13px;
            color: #a8875c;
            margin-top: 5px;
        }
        .copy-btn {
            background: #ffc252;
            border: none;
            color: #fff;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #ffb020;
        }
        .help-box {
            margin-top: 35px;
            background: #fff9e8;
            border-radius: 16px;
            padding: 20px;
            border: 1px dashed #ffd88a;
        }
        .help-box h4 {
            color: #ffaa2b;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .help-box p {
            color: #8c6d42;
            line-height: 1.7;
            font-size: 14px;
        }
        .update-time {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #c4a474;
        }
    </style>
</head>
<body>
    <div class="duck-wrap">
        <div class="duck-title">
            <h1>🐥 超能下蛋鸭</h1>
        </div>
        <div class="duck-desc">
            全自动更新兑换码 · 出新码微信及时提醒
        </div>

        <div id="codeList">
            <!-- 自动加载最新兑换码 -->
        </div>

        <div class="help-box">
            <h4>🥚 兑换码使用教程</h4>
            <p>1. 微信打开小游戏：超能下蛋鸭</p>
            <p>2. 点击左上角头像，进入个人中心</p>
            <p>3. 找到【礼包兑换码】入口</p>
            <p>4. 复制上方兑换码粘贴，即可领取奖励</p>
        </div>

        <div class="update-time" id="updateText">最后更新：加载中...</div>
    </div>

<script>
    let codeData = [
        {code: "kdn888", tag: "最新", tip: "限时有效｜钻石礼包"},
        {code: "DUCK666", tag: "常规", tip: "长期有效｜金币奖励"},
        {code: "DUCK888", tag: "常规", tip: "长期有效｜道具福利"},
        {code: "VIP666", tag: "福利", tip: "永久可用｜稀有道具"},
        {code: "xxn666", tag: "福利", tip: "永久可用｜新手礼包"}
    ];

    function initPage() {
        let html = "";
        codeData.forEach(item => {
            html += `
            <div class="code-card">
                <div class="code-info">
                    <span class="code-str">${item.code}</span>
                    ${item.tag === "最新" ? '<span class="new-badge">新码</span>' : ''}
                    <div class="code-tip">${item.tip}</div>
                </div>
                <button class="copy-btn" onclick="copyCode('${item.code}')">一键复制</button>
            </div>
            `;
        })
        document.getElementById("codeList").innerHTML = html;
        document.getElementById("updateText").innerText = 
        "最后全自动更新：" + new Date().toLocaleString();
    }

    function copyCode(text) {
        navigator.clipboard.writeText(text);
        alert("🐥 已复制兑换码：" + text);
    }

    initPage();
</script>
</body>
</html>
